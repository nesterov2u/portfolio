name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare static artifact
        run: |
          mkdir -p _site
          cp index.html 404.html app.js tailwind.css styles.css _site/
          cp -R assets content _site/

          if [ -d admin ]; then
            cp -R admin _site/
          fi

          if [ -f CNAME ]; then
            cp CNAME _site/
          fi

      - name: Inject current favicon into HTML
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path(".")
          site = json.loads((root / "content/globals/site.json").read_text(encoding="utf-8"))
          favicon = site.get("favicon", "").lstrip("/")
          if not favicon:
              raise SystemExit("content/globals/site.json is missing favicon")

          source = root / favicon
          if not source.exists():
              raise SystemExit(f"Favicon asset not found: {favicon}")

          suffix = source.suffix.lower()
          if suffix == ".svg":
              mime = "image/svg+xml"
          elif suffix == ".ico":
              mime = "image/x-icon"
          else:
              mime = "image/png"

          digest = hashlib.sha256(source.read_bytes()).hexdigest()[:12]
          href = f"{favicon}?v={digest}"

          for name in ("index.html", "404.html"):
              path = root / "_site" / name
              html = path.read_text(encoding="utf-8")
              html = html.replace("__FAVICON_HREF__", href)
              html = html.replace("__FAVICON_TYPE__", mime)
              path.write_text(html, encoding="utf-8")
          PY

      - name: Verify artifact
        run: |
          test -f _site/index.html
          test -f _site/404.html
          test -f _site/app.js
          test -f _site/tailwind.css
          test -f _site/styles.css
          test -f _site/content/pages/home.json
          test -d _site/assets
          test -d _site/content
          ! grep -q "__FAVICON_" _site/index.html
          ! grep -q "__FAVICON_" _site/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
