name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare static artifact
        run: |
          mkdir -p _site
          cp index.html 404.html app.js styles.css _site/
          cp -R assets content _site/

          if [ -d admin ]; then
            cp -R admin _site/
          fi

          if [ -f CNAME ]; then
            cp CNAME _site/
          fi

      - name: Verify artifact
        run: |
          test -f _site/index.html
          test -f _site/404.html
          test -f _site/app.js
          test -f _site/styles.css
          test -f _site/content/pages/home.json
          test -d _site/assets
          test -d _site/content

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
