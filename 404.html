<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Andrey Nesterov — Product Designer</title>
    <meta
      name="description"
      content="Product Designer with a multidisciplinary background in interfaces, branding, illustration, packaging, and motion."
    />
    <link rel="icon" type="__FAVICON_TYPE__" href="__FAVICON_HREF__" />
    <link rel="shortcut icon" type="__FAVICON_TYPE__" href="__FAVICON_HREF__" />
    <link rel="apple-touch-icon" href="__FAVICON_HREF__" />
    <script>
      (function normalizeFaviconLinks() {
        const segments = window.location.pathname.split("/").filter(Boolean);
        const base =
          window.location.hostname.endsWith("github.io") && segments.length > 0
            ? `/${segments[0]}`
            : "";

        document
          .querySelectorAll('link[rel="icon"], link[rel="shortcut icon"], link[rel="apple-touch-icon"]')
          .forEach((link) => {
            const href = link.getAttribute("href");

            if (!href || href.startsWith("/") || href.startsWith("data:") || /^https?:/i.test(href)) {
              return;
            }

            link.href = `${base}/${href.replace(/^\/+/, "")}`;
          });
      })();

      (function refreshFaviconFromContent() {
        const segments = window.location.pathname.split("/").filter(Boolean);
        const base =
          window.location.hostname.endsWith("github.io") && segments.length > 0
            ? `/${segments[0]}`
            : "";
        const cacheKey = Date.now();

        const iconTypeFor = (path) => {
          const cleanPath = path.split("?")[0].toLowerCase();

          if (cleanPath.endsWith(".svg")) {
            return "image/svg+xml";
          }

          if (cleanPath.endsWith(".ico")) {
            return "image/x-icon";
          }

          return "image/png";
        };

        const resolveAsset = (path) => {
          if (!path || path.startsWith("data:") || /^https?:/i.test(path)) {
            return path;
          }

          if (path.startsWith("/")) {
            return path;
          }

          return `${base}/${path.replace(/^\/+/, "")}`;
        };

        const versionAsset = (path) => `${path}${path.includes("?") ? "&" : "?"}v=${cacheKey}`;

        const setIcon = (rel, href, type) => {
          let link = document.querySelector(`link[rel="${rel}"]`);

          if (!link) {
            link = document.createElement("link");
            link.rel = rel;
            document.head.appendChild(link);
          }

          if (type) {
            link.type = type;
          } else {
            link.removeAttribute("type");
          }

          link.href = href;
        };

        fetch(`${base}/content/globals/site.json?v=${cacheKey}`, { cache: "no-store" })
          .then((response) => (response.ok ? response.json() : null))
          .then((site) => {
            if (!site || !site.favicon) {
              return;
            }

            const href = versionAsset(resolveAsset(site.favicon));
            const type = iconTypeFor(site.favicon);

            setIcon("icon", href, type);
            setIcon("shortcut icon", href, type);
            setIcon("apple-touch-icon", href, "");
          })
          .catch(() => {});
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Unbounded:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function injectAssets() {
        const segments = window.location.pathname.split("/").filter(Boolean);
        const base =
          window.location.hostname.endsWith("github.io") && segments.length > 0
            ? `/${segments[0]}`
            : "";

        const tailwind = document.createElement("link");
        tailwind.rel = "stylesheet";
        tailwind.href = `${base}/tailwind.css`;
        document.head.appendChild(tailwind);

        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `${base}/styles.css`;
        document.head.appendChild(stylesheet);
      })();
    </script>
  </head>
  <body class="bg-paper text-ink font-body">
    <div id="app"></div>
    <script type="module">
      const segments = window.location.pathname.split("/").filter(Boolean);
      const base =
        window.location.hostname.endsWith("github.io") && segments.length > 0
          ? `/${segments[0]}`
          : "";

      import(`${base}/app.js`);
    </script>
  </body>
</html>
